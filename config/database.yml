default: &default
  adapter: mysql2
  encoding: utf8mb4
  collation: utf8mb4_unicode_ci
  pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>
  host: <%= ENV.fetch("DB_HOST", "127.0.0.1") %>
  port: <%= ENV.fetch("DB_PORT", 3306) %>
  username: <%= ENV.fetch("DB_USERNAME", "root") %>
  password: <%= ENV.fetch("DB_PASSWORD", "") %>
  # TiDB Cloud Serverless rejects unencrypted connections outright, so this
  # must stay "required" (or stricter) in production even though it's a
  # no-op for local MySQL.
  ssl_mode: <%= ENV.fetch("DB_SSL_MODE", Rails.env.production? ? "required" : "disabled") %>
  # Without this, an unreachable TiDB host (e.g. blocked by an IP allow list)
  # hangs the connection indefinitely instead of failing, which on Render
  # looks like a stuck deploy with no open port rather than a clear error.
  connect_timeout: <%= ENV.fetch("DB_CONNECT_TIMEOUT", 10) %>

development:
  <<: *default
  database: school_management_system_development

test:
  <<: *default
  database: school_management_system_test

production:
  primary: &primary_production
    <<: *default
    database: <%= ENV.fetch("DB_NAME", "school_management_system_production") %>
  cache:
    <<: *primary_production
    database: <%= ENV.fetch("DB_CACHE_NAME", "school_management_system_production_cache") %>
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: <%= ENV.fetch("DB_QUEUE_NAME", "school_management_system_production_queue") %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: <%= ENV.fetch("DB_CABLE_NAME", "school_management_system_production_cable") %>
    migrations_paths: db/cable_migrate
