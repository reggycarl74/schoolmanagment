default: &default
  adapter: mysql2
  encoding: utf8mb4
  collation: utf8mb4_unicode_ci
  pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>
  host: <%= ENV.fetch("DB_HOST", "127.0.0.1") %>
  port: <%= ENV.fetch("DB_PORT", 3306) %>
  username: <%= ENV.fetch("DB_USERNAME", "root") %>
  password: <%= ENV["DB_PASSWORD"] %>
  ssl_mode: <%= ENV.fetch("DB_SSL_MODE", Rails.env.production? ? "required" : "disabled") %>

development:
  <<: *default
  database: school_management_system_development

test:
  <<: *default
  database: school_management_system_test

production:
  primary: &primary_production
    <<: *default
    database: <%= ENV.fetch("DB_NAME", "school_management_system_production") %>
  cache:
    <<: *primary_production
    database: <%= ENV.fetch("DB_CACHE_NAME", ENV.fetch("DB_NAME", "school_management_system_production")) %>
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: <%= ENV.fetch("DB_QUEUE_NAME", ENV.fetch("DB_NAME", "school_management_system_production")) %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: <%= ENV.fetch("DB_CABLE_NAME", ENV.fetch("DB_NAME", "school_management_system_production")) %>
    migrations_paths: db/cable_migrate
